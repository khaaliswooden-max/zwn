version: "3.9"

services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/zwm_dev_password
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  indexer:
    build:
      context: ./zuup-zwm-indexer
      dockerfile: Dockerfile
    ports:
      - "3001:3001"   # Enterprise REST API
      - "4000:4000"   # GraphQL
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: zwm_dev_password
      SOLANA_RPC_HTTP: https://api.devnet.solana.com
      SOLANA_RPC_WS: wss://api.devnet.solana.com
      CIVIUM_PROGRAM_ID: H1eSx6ij1Q296Tzss62AHuamn1rD4a9MkDapYu1CyvVM
      AUREON_PROGRAM_ID: AurEoN5mBdZFvgFjSJGnmVZWe2FsBM3VN47L6PemxGWy
      ENTERPRISE_API_PORT: "3001"
      GRAPHQL_PORT: "4000"
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
